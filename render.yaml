services:
  - type: web
    name: zip-forecast-api
    runtime: docker
    region: oregon
    plan: starter
    branch: main
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: WORLD_WEATHER_ONLINE_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: zip-forecast-web
    runtime: static
    region: oregon
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
