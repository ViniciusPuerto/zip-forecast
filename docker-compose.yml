# Published DB/Redis ports use 5433 and 6380 so this stack can run alongside another
# Postgres/Redis on the host (e.g. 5432/6379 already in use).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    # Local: uses db + redis services. Production: point DATABASE_URL (Neon) and REDIS_URL (Upstash); see api/.env.example.
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: ""
    command: ["./bin/rails", "server", "-b", "0.0.0.0"]
    volumes:
      - ./api:/rails:cached
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      BUNDLE_WITHOUT: ""
      # Explicit URL so Active Record always uses TCP to the db service (avoids empty host → Unix socket).
      DATABASE_URL: postgres://postgres:postgres@db:5432/api_development
      DB_HOST: db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      POSTGRES_DB: api_development
      REDIS_URL: redis://redis:6379/0
      FRONTEND_ORIGIN: http://localhost:5173
      WORLD_WEATHER_ONLINE_API_KEY: ${WORLD_WEATHER_ONLINE_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app:cached
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - api

volumes:
  postgres_data:
  frontend_node_modules:
